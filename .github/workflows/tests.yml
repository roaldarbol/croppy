name: tests

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.10
        with:
          environments: dev
          cache: true

      - name: Lint (ruff)
        run: pixi run -e dev lint

      - name: Test (pytest)
        env:
          # Run Qt headless so pytest-qt can construct widgets on CI runners
          # without an X server / display.
          QT_QPA_PLATFORM: offscreen
        run: pixi run -e dev test
