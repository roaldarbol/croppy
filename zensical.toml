[project]
site_name = "Croppy"
site_description = "Common video chores — cropping, trimming, joining, and compressing — in one window."
site_author = "Mikkel Roald-Arbøl"
site_url = "https://roald-arboel.com/croppy/"
repo_url = "https://github.com/roaldarbol/croppy"
repo_name = "roaldarbol/croppy"
copyright = "Copyright &copy; Mikkel Roald-Arbøl — MIT licensed"

# Structural + typographic touches (fonts, boxed content, sidebar, footer cards)
# live in the stylesheet; the colour palette stays Croppy's built-in deep purple.
extra_css = ["stylesheets/extra.css"]

nav = [
  { "Home" = "index.md" },
  { "Install" = "install.md" },
  { "Usage" = [
    { "Clip" = "clip.md" },
    { "Compress" = "compress.md" },
    { "Combine" = "combine.md" },
    { "Encoding & presets" = "encoding.md" },
    { "Output & jobs" = "output-and-jobs.md" },
  ] },
  { "FAQ" = "faq.md" },
  { "Credits" = "credits.md" },
]

[project.theme]
language = "en"
logo = "assets/logo.png"
favicon = "assets/logo.png"

# A pixi.sh-style left sidebar: collapsible sections (no `navigation.sections`,
# which would flatten them into always-open groups; no `navigation.tabs`, which
# would move them into the header). `navigation.indexes` folds a section's
# overview page into its header where one exists.
features = [
  "content.code.copy",
  "content.code.annotate",
  "navigation.instant",
  "navigation.instant.progress",
  "navigation.indexes",
  "navigation.top",
  "navigation.tracking",
  "navigation.footer",
  "toc.follow",
  "search.highlight",
  "search.suggest",
]

# Body in Inter, code in JetBrains Mono (like pixi.sh); the warm display serif
# for headings/titles is set in stylesheets/extra.css.
[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "deep purple"
accent = "deep purple"
toggle.icon = "material/weather-night"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "deep purple"
accent = "purple"
toggle.icon = "material/weather-sunny"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.emoji]
